<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary LaTeX Notes</title>
    <meta name="description" content="A comfortable writing space for post-dictation correction, LaTeX notes, and equations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&family=Nunito:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                var prefs = JSON.parse(localStorage.getItem('temporary_latex_note_prefs') || '{}');
                var fallback = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.dataset.theme = prefs.theme || fallback;
                document.documentElement.dataset.editorSize = prefs.editorSize || 'large';
                document.documentElement.dataset.editorFont = prefs.editorFont || 'literata';
                document.documentElement.dataset.focusMode = prefs.focusMode ? 'on' : 'off';
            } catch (error) {
                document.documentElement.dataset.theme = 'dark';
                document.documentElement.dataset.editorSize = 'large';
                document.documentElement.dataset.editorFont = 'literata';
                document.documentElement.dataset.focusMode = 'off';
            }
        }());
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.47/dist/katex.min.css"
        integrity="sha384-nH0MfJ44wi1dd7w6jinlyBgljjS8EJAh2JBoRad8a3VDw2K69vfaaqm4WnR+gXtA" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.47/dist/katex.min.js"
        integrity="sha384-CwjPRVHTvLiMBFjEoij+QZViMV5rhTOIp7CJzl24JEqpRDA1sJFHVXXLURktbYYp"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.47/dist/contrib/auto-render.min.js"
        integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="app.js"></script>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">TeX</div>
                <div>
                    <h1 class="app-title">Temporary LaTeX Notes</h1>
                    <p class="app-subtitle">A calm space to revise dictated text and write with LaTeX</p>
                </div>
            </div>

            <div class="top-actions">
                <div class="segmented" role="group" aria-label="Theme">
                    <button class="segment-btn" type="button" data-theme-choice="light">
                        <i data-lucide="sun"></i>
                        <span>Light</span>
                    </button>
                    <button class="segment-btn" type="button" data-theme-choice="dark">
                        <i data-lucide="moon"></i>
                        <span>Dark</span>
                    </button>
                </div>

                <div class="status-pill" id="statusPill" aria-live="polite">
                    <span class="status-dot" aria-hidden="true"></span>
                    <span id="statusText">Ready</span>
                </div>
            </div>
        </header>

        <main>
            <section class="toolbar" aria-label="Note controls">
                <label class="title-field" for="noteTitle">
                    <span>Note Title</span>
                    <input id="noteTitle" type="text" autocomplete="off">
                </label>

                <div class="toolbar-actions" aria-label="Main actions">
                    <button class="btn primary" id="renderBtn" type="button">
                        <i data-lucide="refresh-cw"></i>
                        <span>Render</span>
                    </button>
                    <button class="btn" id="loadSampleBtn" type="button">
                        <i data-lucide="sparkles"></i>
                        <span>Sample</span>
                    </button>
                    <button class="btn" id="openFileBtn" type="button">
                        <i data-lucide="folder-open"></i>
                        <span>Open</span>
                    </button>
                    <button class="btn" id="downloadTexBtn" type="button">
                        <i data-lucide="download"></i>
                        <span>.tex</span>
                    </button>
                    <button class="btn" id="downloadHtmlBtn" type="button">
                        <i data-lucide="file-down"></i>
                        <span>HTML</span>
                    </button>
                    <button class="btn" id="downloadPdfBtn" type="button">
                        <i data-lucide="file-text"></i>
                        <span>PDF</span>
                    </button>
                    <button class="btn" id="copyPngBtn" type="button" title="Copy the rendered note as PNG">
                        <i data-lucide="image"></i>
                        <span>Copy PNG</span>
                    </button>
                    <button class="btn" id="copySvgBtn" type="button" title="Copy the rendered note as SVG">
                        <i data-lucide="panel-top"></i>
                        <span>Copy SVG</span>
                    </button>
                    <button class="btn danger" id="clearBtn" type="button">
                        <i data-lucide="trash-2"></i>
                        <span>Clear</span>
                    </button>
                </div>

                <div class="snippet-row" aria-label="Insert snippets">
                    <span class="snippet-label">Insert</span>
                    <button class="chip-btn" type="button" data-snippet="inlineMath">
                        <i data-lucide="sigma"></i>
                        <span>Inline</span>
                    </button>
                    <button class="chip-btn" type="button" data-snippet="displayMath">
                        <i data-lucide="braces"></i>
                        <span>Display</span>
                    </button>
                    <button class="chip-btn" type="button" data-snippet="align">
                        <i data-lucide="align-left"></i>
                        <span>Align</span>
                    </button>
                    <button class="chip-btn" type="button" data-snippet="itemize">
                        <i data-lucide="list"></i>
                        <span>List</span>
                    </button>
                    <button class="chip-btn" type="button" data-snippet="section">
                        <i data-lucide="heading-2"></i>
                        <span>Section</span>
                    </button>
                    <button class="chip-btn" type="button" data-snippet="bold">
                        <i data-lucide="bold"></i>
                        <span>Bold</span>
                    </button>
                </div>
            </section>

            <section class="workspace" aria-label="LaTeX note workspace">
                <section class="pane editor-pane" aria-label="Source editor">
                    <div class="pane-header">
                        <div>
                            <div class="pane-title">Source</div>
                            <div class="pane-meta">
                                <span class="stat-pill"><span id="wpmCount">0</span> WPM</span>
                                <span><span id="characterCount">0</span> chars</span>
                                <span><span id="wordCount">0</span> words</span>
                                <span><span id="lineCount">0</span> lines</span>
                                <span class="stat-pill session-stat" id="sessionStat" hidden><span id="sessionWords">0</span> this session</span>
                            </div>
                        </div>
                        <div class="pane-actions">
                            <button class="btn small" id="focusModeBtn" type="button" title="Expand editor (hide preview)">
                                <i data-lucide="maximize-2"></i>
                                <span>Focus</span>
                            </button>
                            <button class="btn small" id="copySourceBtn" type="button" title="Copy source (Ctrl+C)">
                                <i data-lucide="copy"></i>
                                <span>Copy</span>
                            </button>
                        </div>
                    </div>

                    <textarea id="sourceInput" spellcheck="true"
                        placeholder="Paste dictated text here, then revise and polish. Use $inline math$ or display equations when needed."></textarea>

                    <div class="pane-footer">
                        <div class="footer-controls">
                            <label class="toggle-control">
                                <input id="livePreviewToggle" type="checkbox">
                                <span>Live Preview</span>
                            </label>
                            <label class="toggle-control">
                                <input id="typingSoundToggle" type="checkbox" checked>
                                <span>Keystroke Sound</span>
                            </label>
                            <label class="select-control select-control--sound" for="typingSoundStyle" id="typingSoundStyleWrap">
                                <span>Sound</span>
                                <select id="typingSoundStyle">
                                    <option value="keystroke" selected>Keystroke</option>
                                    <option value="typewriter">Typewriter</option>
                                    <option value="soft">Soft click</option>
                                    <option value="bubble">Bubble pop</option>
                                    <option value="marble">Marble tap</option>
                                    <option value="chime">Soft chime</option>
                                    <option value="piano">Soft piano</option>
                                </select>
                            </label>
                        </div>
                        <div class="footer-settings">
                            <label class="select-control select-control--font" for="editorFont">
                                <span>Font</span>
                                <select id="editorFont">
                                    <option value="literata">Literata — Book</option>
                                    <option value="source-serif">Source Serif — Elegant</option>
                                    <option value="inter">Inter — Clean</option>
                                    <option value="nunito">Nunito — Soft</option>
                                    <option value="caveat">Caveat — Handwriting</option>
                                    <option value="jetbrains">JetBrains — Code</option>
                                    <option value="plex">IBM Plex — Typewriter</option>
                                </select>
                            </label>
                            <label class="select-control" for="editorSize">
                                <span>Text Size</span>
                                <select id="editorSize">
                                    <option value="small">Small</option>
                                    <option value="medium">Medium</option>
                                    <option value="large">Large</option>
                                    <option value="xlarge">Extra Large</option>
                                </select>
                            </label>
                        </div>
                    </div>
                </section>

                <section class="pane preview-pane" aria-label="Rendered preview">
                    <div class="pane-header">
                        <div>
                            <div class="pane-title">Preview</div>
                            <div class="pane-meta">
                                <span><span id="mathCount">0</span> math</span>
                                <span id="savedStamp">Saved locally</span>
                            </div>
                        </div>
                        <div class="pane-actions">
                            <button class="btn small" id="copyPreviewBtn" type="button">
                                <i data-lucide="clipboard-copy"></i>
                                <span>Copy Text</span>
                            </button>
                        </div>
                    </div>

                    <article class="preview-content" id="previewOutput"></article>
                    <div class="diagnostics" id="diagnostics" hidden></div>
                </section>
            </section>
        </main>
    </div>

    <input class="hidden-input" id="fileInput" type="file" accept=".tex,.txt,.md,text/*">
    <div class="toast-container" id="toastContainer"></div>
</body>

</html>
